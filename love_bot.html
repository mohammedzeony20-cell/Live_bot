<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do you love me? 🐻</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #ffd6e0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* floating hearts background */
  .hearts-bg {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .heart-float {
    position: absolute;
    animation: floatUp linear infinite;
    opacity: 0.18;
    font-size: 1.5rem;
  }

  @keyframes floatUp {
    0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.18; }
    90%  { opacity: 0.18; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  .card {
    position: relative; z-index: 1;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    border-radius: 32px;
    padding: 2.5rem 2rem 2rem;
    text-align: center;
    box-shadow: 0 20px 60px rgba(255,105,135,0.25);
    max-width: 340px;
    width: 90vw;
    border: 2px solid rgba(255,180,200,0.5);
  }

  .bear-emoji {
    font-size: 5rem;
    display: block;
    margin-bottom: 0.5rem;
    animation: bounce 1.5s ease-in-out infinite;
  }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }

  h1 {
    font-size: 1.9rem;
    font-weight: 900;
    color: #d63b6a;
    margin-bottom: 1.8rem;
    line-height: 1.2;
  }

  .btn-area {
    position: relative;
    height: 100px;
    margin-top: 0.5rem;
  }

  .btn {
    padding: 0.8rem 2.4rem;
    border: none;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.1rem;
    font-weight: 900;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    position: absolute;
  }

  .btn-yes {
    background: linear-gradient(135deg, #ff6b9d, #ff4081);
    color: white;
    box-shadow: 0 6px 20px rgba(255,64,129,0.4);
    left: 10%; top: 20px;
  }
  .btn-yes:hover { transform: scale(1.08); box-shadow: 0 8px 28px rgba(255,64,129,0.5); }
  .btn-yes:active { transform: scale(0.97); }

  .btn-no {
    background: linear-gradient(135deg, #ffa0b8, #ff7096);
    color: white;
    box-shadow: 0 6px 20px rgba(255,112,150,0.4);
    right: 10%; top: 20px;
    transition: left 0.05s, top 0.05s, right 0.05s, bottom 0.05s;
    position: absolute;
  }

  /* result screen */
  .result {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 0.8rem;
  }
  .result.show { display: flex; }
  .result-emoji { font-size: 4.5rem; animation: popIn 0.4s cubic-bezier(.175,.885,.32,1.275); }
  @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }
  .result-text { font-size: 1.5rem; font-weight: 900; color: #d63b6a; }
  .result-sub { font-size: 0.95rem; color: #e8789a; font-weight: 700; }
</style>
</head>
<body>

<div class="hearts-bg" id="heartsBg"></div>

<div class="card" id="questionCard">
  <span class="bear-emoji">🐻</span>
  <h1>Do you love me? 💕</h1>
  <div class="btn-area" id="btnArea">
    <button class="btn btn-yes" id="yesBtn">Yes 😍</button>
    <button class="btn btn-no" id="noBtn">No 🙅</button>
  </div>

  <div class="result" id="result">
    <span class="result-emoji">🥰</span>
    <div class="result-text">I knew it!! 💖</div>
    <div class="result-sub">You're the best thing ever~</div>
  </div>
</div>

<script>
  // Init Telegram WebApp
  if (window.Telegram && window.Telegram.WebApp) {
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
  }

  // Floating hearts
  const bg = document.getElementById('heartsBg');
  const hSymbols = ['❤️','💕','💖','💗','🩷','💝'];
  for (let i = 0; i < 18; i++) {
    const h = document.createElement('span');
    h.className = 'heart-float';
    h.textContent = hSymbols[Math.floor(Math.random() * hSymbols.length)];
    h.style.left = Math.random() * 100 + 'vw';
    h.style.animationDuration = (6 + Math.random() * 8) + 's';
    h.style.animationDelay = (Math.random() * 8) + 's';
    h.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
    bg.appendChild(h);
  }

  // No button runs away 😈
  const noBtn = document.getElementById('noBtn');
  const btnArea = document.getElementById('btnArea');
  let escapeCount = 0;

  function runAway() {
    escapeCount++;
    const areaRect = btnArea.getBoundingClientRect();
    const btnW = noBtn.offsetWidth;
    const btnH = noBtn.offsetHeight;
    const maxX = areaRect.width - btnW;
    const maxY = areaRect.height - btnH;
    const rx = Math.floor(Math.random() * maxX);
    const ry = Math.floor(Math.random() * maxY);
    noBtn.style.left = rx + 'px';
    noBtn.style.top  = ry + 'px';
    noBtn.style.right = 'auto';
    if (escapeCount > 4) {
      noBtn.style.fontSize = '0.6rem';
      noBtn.style.padding  = '0.3rem 0.8rem';
    }
  }

  noBtn.addEventListener('mouseover', runAway);
  noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); runAway(); }, { passive: false });

  // Yes — show result
  document.getElementById('yesBtn').addEventListener('click', () => {
    document.getElementById('btnArea').style.display = 'none';
    document.getElementById('result').classList.add('show');
    // send data back to bot if inside Telegram
    if (window.Telegram && window.Telegram.WebApp) {
      Telegram.WebApp.sendData('yes');
    }
  });
</script>
</body>
</html>
